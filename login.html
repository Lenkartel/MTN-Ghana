<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}

:root{
  --eco-blue:#003a8f;
  --eco-red:#e11c2a;
}

/* BODY */
body{
  font-family:Inter,system-ui,Arial;
  background:#ffffff;
  margin:0;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#020617;
}

/* CARD */
.card{
  width:100%;
  max-width:380px;
  background:#ffffff;
  padding:24px;
  border-radius:18px;
  box-shadow:0 14px 30px rgba(0,0,0,.12);
}

/* LOGO */
.logo{
  height:68px;
  display:block;
  margin:0 auto 6px;
}

/* TITLE */
.login-title{
  text-align:center;
  font-weight:700;
  margin-bottom:18px;
}

/* LABEL */
label{
  display:block;
  font-size:13px;
  margin-top:14px;
  color:#475569;
}

/* PHONE FIELD (BLUE LIKE PIN) */
.phone-field{
  display:flex;
  align-items:center;
  border-radius:14px;
  border:2px solid var(--eco-blue);
  background:#f8fafc;
}

.cc{
  padding:12px 10px;
  min-width:64px;
  text-align:center;
  font-weight:600;
}

.divider{
  width:1px;
  height:60%;
  background:#d1d5db;
}

.phone-input{
  flex:1;
  padding:12px;
  border:0;
  outline:none;
  background:transparent;
  font-size:14px;
}

.phone-input::placeholder{color:#9ca3af}

/* PIN BOXES */
.pin-row{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:14px;
}

.pin-box{
  width:46px;
  height:46px;
  border-radius:14px;
  border:2px solid var(--eco-blue);
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:700;
  position:relative;
}

.pin-box.active::after{
  content:"";
  position:absolute;
  width:2px;
  height:60%;
  background:#020617;
  animation:blink 1s steps(1) infinite;
}

@keyframes blink{50%{opacity:0}}

#pin{
  position:absolute;
  opacity:0;
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,var(--eco-blue),var(--eco-red));
  padding:12px;
  border:0;
  width:100%;
  font-weight:700;
  margin-top:22px;
  cursor:pointer;
  color:#ffffff;
  border-radius:14px;
}

.btn[disabled]{opacity:.6}

/* ERROR */
.error{
  font-size:13px;
  color:#dc2626;
  min-height:18px;
  margin-top:6px;
}

/* OTP MODAL */
.otp-modal{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.92);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.otp-box{
  background:#ffffff;
  padding:24px;
  min-width:360px;
  border-radius:18px;
  box-shadow:0 14px 30px rgba(0,0,0,.12);
}

/* OTP BOXES */
.otp-row{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:14px;
}

.otp-digit{
  width:44px;
  height:44px;
  border-radius:12px;
  border:2px solid var(--eco-blue);
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:600;
  position:relative;
}

.otp-digit.active::after{
  content:"";
  position:absolute;
  width:2px;
  height:60%;
  background:#020617;
  animation:blink 1s steps(1) infinite;
}

.otp-digit.filled{
  background:#e6efff;
  border-color:var(--eco-red);
}

.small{font-size:13px;color:#64748b}

.resend-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
}

.resend-btn{
  background:linear-gradient(135deg,var(--eco-blue),var(--eco-red));
  border:0;
  padding:8px 14px;
  cursor:pointer;
  color:#fff;
  border-radius:12px;
}

.action-secondary{
  background:#e5e7eb;
  color:#020617;
}
</style>
</head>

<body>

<div class="card">
  <img src="assets/eco.png" class="logo">
  <div class="login-title">Login</div>

  <form id="loginForm">
    <label>Mobile Number</label>
    <div class="phone-field">
      <div class="cc">+263</div>
      <div class="divider"></div>
      <input id="phone" class="phone-input" inputmode="numeric" placeholder="Mobile No.">
    </div>
    <div id="phoneError" class="error"></div>

    <label>Login PIN</label>
    <div class="pin-row" id="pinBoxes">
      <div class="pin-box"></div>
      <div class="pin-box"></div>
      <div class="pin-box"></div>
      <div class="pin-box"></div>
    </div>
    <input id="pin" inputmode="numeric" maxlength="4">

    <button id="loginBtn" class="btn" disabled>LOGIN</button>
  </form>
</div>

<!-- OTP MODAL -->
<div id="otpModal" class="otp-modal">
  <div class="otp-box">
    <div style="text-align:center"><strong>Enter OTP</strong></div>
    <p class="small">We sent an OTP to your phone</p>

    <div class="otp-row">
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
    </div>

    <input id="otpBuffer" inputmode="numeric" autocomplete="one-time-code"
           style="position:absolute;opacity:0">

    <div style="display:flex;gap:10px;margin-top:14px">
      <button id="confirmOtp" class="resend-btn" disabled>Confirm</button>
      <button id="cancelOtp" class="resend-btn action-secondary">Cancel</button>
    </div>
  </div>
</div>

<script>
/* PHONE + PIN */
const phone=document.getElementById('phone');
const pin=document.getElementById('pin');
const pinBoxes=[...document.querySelectorAll('.pin-box')];
const loginBtn=document.getElementById('loginBtn');
const phoneError=document.getElementById('phoneError');

function validatePhone(){
  if(!/^7\d{8}$/.test(phone.value)){
    phoneError.textContent='Enter 9 digits starting with 7';
    return false;
  }
  phoneError.textContent='';
  return true;
}

function renderPin(){
  pinBoxes.forEach((b,i)=>{
    b.textContent=pin.value[i]||'';
    b.classList.toggle('active',i===pin.value.length);
  });
}

phone.oninput=()=>{
  phone.value=phone.value.replace(/\D/g,'').slice(0,9);
  updateState();
};

pin.oninput=()=>{
  pin.value=pin.value.replace(/\D/g,'').slice(0,4);
  renderPin();
  updateState();
};

document.getElementById('pinBoxes').onclick=()=>pin.focus();

function updateState(){
  loginBtn.disabled=!(validatePhone() && pin.value.length===4);
}

/* LOGIN */
const otpModal=document.getElementById('otpModal');
document.getElementById('loginForm').onsubmit=e=>{
  e.preventDefault();
  otpModal.style.display='flex';
  startOtp();
};

/* OTP */
const buffer=document.getElementById('otpBuffer');
const dots=[...document.querySelectorAll('.otp-digit')];
const confirmBtn=document.getElementById('confirmOtp');

function renderOtp(v){
  dots.forEach((d,i)=>{
    d.textContent=v[i]||'';
    d.classList.toggle('filled',!!v[i]);
    d.classList.toggle('active',i===v.length);
  });
  confirmBtn.disabled=v.length!==6;
}

function startOtp(){
  buffer.value='';
  renderOtp('');
  buffer.focus();
}

buffer.oninput=()=>{
  buffer.value=buffer.value.replace(/\D/g,'').slice(0,6);
  renderOtp(buffer.value);
};

dots.forEach(d=>d.onclick=()=>buffer.focus());

confirmBtn.onclick=()=>location.href='thankyou.html';
document.getElementById('cancelOtp').onclick=()=>otpModal.style.display='none';
</script>

</body>
</html>
