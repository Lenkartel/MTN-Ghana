<!doctype html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
box-sizing:border-box;
font-family:Inter;
}

body{

background:

radial-gradient(circle at 20% 40%, rgba(0,58,143,.7), transparent 60%),
radial-gradient(circle at 80% 70%, rgba(225,28,42,.6), transparent 60%),
#020617;

color:white;

padding:30px 16px;

}

/* CONTAINER */

.box{

max-width:1000px;

margin:auto;

padding:26px;

border-radius:26px;

background:rgba(255,255,255,.05);

box-shadow:

0 40px 80px rgba(0,0,0,.7),
0 0 60px rgba(0,58,143,.3);

}

/* HEADER */

.top{

display:flex;

justify-content:center;

align-items:center;

gap:20px;

margin-bottom:28px;

}

.top img{

height:34px;

}

/* TITLE */

.title{

text-align:center;

font-size:32px;

font-weight:800;

margin-bottom:18px;

background:linear-gradient(90deg,#fff,#4da3ff);

-webkit-background-clip:text;

color:transparent;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:18px;

}

/* CARD */

.card{

padding:18px;

border-radius:18px;

cursor:pointer;

background:

linear-gradient(140deg,#081833,#020617);

border:1px solid rgba(77,163,255,.35);

box-shadow:

0 0 20px rgba(0,58,143,.4);

transition:.25s;

}

.card:hover{

transform:translateY(-6px);

box-shadow:

0 20px 40px rgba(0,0,0,.7),
0 0 40px rgba(77,163,255,.4);

}

.icon{

width:28px;

margin-bottom:12px;

}

.tag{

font-size:11px;

padding:4px 10px;

border-radius:999px;

border:1px solid rgba(255,255,255,.25);

display:inline-block;

margin-bottom:8px;

}

.name{

font-weight:700;

font-size:18px;

}

.duration{

color:#c7d2fe;

font-size:13px;

margin:6px 0;

}

.price{

font-size:22px;

font-weight:800;

color:#ff3b3b;

}

/* FOOTER */

.footer{

text-align:center;

margin-top:28px;

}

.footer img{

height:38px;

}

/* MOBILE */

@media(max-width:900px){

.grid{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:500px){

.grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="box">

<div class="top">

<img src="assets/econet.png">

<img src="assets/starlink.svg">

</div>

<div class="title">

DIRECT TO CELL STARLINK DATA PLANS

</div>

<div class="grid">

<div class="card" onclick="selectPlan('15GB')">

<img src="assets/signal.svg" class="icon">

<div class="tag">Light</div>

<div class="name">15GB</div>

<div class="duration">7 days</div>

<div class="price">USD 0.99</div>

</div>


<div class="card" onclick="selectPlan('35GB')">

<img src="assets/wifi.svg" class="icon">

<div class="tag">Balanced</div>

<div class="name">35GB</div>

<div class="duration">14 days</div>

<div class="price">USD 1.99</div>

</div>


<div class="card" onclick="selectPlan('50GB')">

<img src="assets/rocket.svg" class="icon">

<div class="tag">Heavy</div>

<div class="name">50GB</div>

<div class="duration">21 days</div>

<div class="price">USD 2.99</div>

</div>


<div class="card" onclick="selectPlan('UNLIMITED')">

<img src="assets/infinity.svg" class="icon">

<div class="tag">Unlimited</div>

<div class="name">Monthly</div>

<div class="duration">30 days</div>

<div class="price">USD 3.99</div>

</div>

</div>


<div class="footer">

<img src="assets/ecocash.png">

</div>

</div>


<script>

function selectPlan(plan){

sessionStorage.setItem("plan",plan)

location.href="login.html"

}

</script>

</body>
</html>
