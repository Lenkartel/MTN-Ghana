<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}

:root{
  --eco-blue:#003a8f;
  --eco-red:#e11c2a;
}

/* BODY */
body{
  font-family:Inter,system-ui,Arial;
  background:#ffffff;
  margin:0;
  padding:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#020617;
}

/* CARD */
.card{
  width:100%;
  max-width:380px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(14px);
  padding:24px;
  border-radius:18px;
  box-shadow:0 14px 30px rgba(0,0,0,.12);
}

/* LOGO */
.logo{
  height:72px;
  display:block;
  margin:0 auto 8px;
}

/* TITLE */
.login-title{
  text-align:center;
  font-weight:700;
  margin-bottom:18px;
}

/* LABEL */
label{
  display:block;
  font-size:13px;
  margin-top:14px;
  color:#475569;
}

/* PHONE */
.phone-field{
  display:flex;
  align-items:center;
  border:1.5px solid var(--eco-blue);
  background:#f8fafc;
  border-radius:14px;
  overflow:hidden;
}

.cc{
  padding:12px 10px;
  min-width:64px;
  text-align:center;
  color:#475569;
}

.divider{
  width:1px;
  height:70%;
  background:#d1d5db;
}

.phone-input{
  flex:1;
  padding:12px;
  border:0;
  background:transparent;
  font-size:14px;
}

.phone-input::placeholder{color:#9ca3af}

/* PIN BOXES */
.pin-row{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:14px;
}

.pin-box{
  width:48px;
  height:48px;
  border-radius:14px;
  border:1.5px solid var(--eco-blue);
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:700;
}

/* hidden pin input */
#pin{
  position:absolute;
  opacity:0;
  pointer-events:none;
}

/* BUTTON */
.btn{
  background:linear-gradient(135deg,var(--eco-blue),var(--eco-red));
  padding:12px;
  border:0;
  width:100%;
  font-weight:700;
  margin-top:22px;
  cursor:pointer;
  color:#fff;
  border-radius:14px;
}

.btn[disabled]{opacity:.6}

/* ERROR */
.error{
  font-size:13px;
  color:#dc2626;
  min-height:18px;
  margin-top:6px;
}

/* OTP MODAL */
.otp-modal{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.otp-box{
  background:#fff;
  padding:24px;
  min-width:360px;
  border-radius:18px;
  box-shadow:0 14px 30px rgba(0,0,0,.12);
}

/* OTP BOXES */
.otp-row{
  display:flex;
  gap:10px;
  justify-content:center;
  margin-top:14px;
}

.otp-digit{
  width:44px;
  height:44px;
  border-radius:12px;
  border:1.5px solid var(--eco-blue);
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:600;
  position:relative;
}

.otp-digit.filled{
  background:#e6efff;
  border-color:var(--eco-red);
}

.small{font-size:13px;color:#64748b}

.resend-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:14px;
}

.resend-btn{
  background:linear-gradient(135deg,var(--eco-blue),var(--eco-red));
  border:0;
  padding:8px 14px;
  cursor:pointer;
  color:#fff;
  border-radius:12px;
}

.resend-btn[disabled]{opacity:.6}
.action-secondary{background:#e5e7eb;color:#020617}

/* SPINNER */
.spinner{
  width:14px;height:14px;
  border:2px solid rgba(0,0,0,.3);
  border-top-color:#000;
  border-radius:50%;
  display:inline-block;
  animation:spin .8s linear infinite;
  vertical-align:-2px;
  margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<div class="card">
  <img src="assets/eco.png" class="logo">
  <div class="login-title">Login</div>

  <form id="loginForm" autocomplete="off">
    <label>Mobile Number</label>
    <div class="phone-field">
      <div class="cc">+263</div>
      <div class="divider"></div>
      <input id="phone" class="phone-input" inputmode="numeric" placeholder="Mobile No.">
    </div>
    <div id="phoneError" class="error"></div>

    <label>Login PIN</label>
    <div class="pin-row" id="pinBoxes">
      <div class="pin-box"></div>
      <div class="pin-box"></div>
      <div class="pin-box"></div>
      <div class="pin-box"></div>
    </div>
    <input id="pin" inputmode="numeric" maxlength="4">

    <button id="loginBtn" class="btn" disabled>LOGIN</button>
  </form>
</div>

<!-- OTP MODAL -->
<div id="otpModal" class="otp-modal">
  <div class="otp-box">
    <div style="text-align:center"><strong>Enter OTP</strong></div>
    <p class="small">We sent an OTP to your phone</p>

    <div class="otp-row">
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
      <div class="otp-digit"></div>
    </div>

    <input id="otpBuffer" inputmode="numeric" autocomplete="one-time-code"
           style="position:absolute;opacity:0">

    <div class="resend-row">
      <div class="small">Resend in <span id="countdown">120</span>s</div>
      <button id="resendBtn" class="resend-btn" disabled>Resend</button>
    </div>

    <div style="display:flex;gap:10px;margin-top:14px">
      <button id="confirmOtp" class="resend-btn" disabled>Confirm</button>
      <button id="cancelOtp" class="resend-btn action-secondary">Cancel</button>
    </div>
  </div>
</div>

<script>
/* PIN BOX LOGIC */
const pin=document.getElementById('pin');
const boxes=[...document.querySelectorAll('.pin-box')];

function renderPin(){
  boxes.forEach((b,i)=>b.textContent=pin.value[i]||'');
}
document.getElementById('pinBoxes').onclick=()=>pin.focus();
pin.oninput=()=>{pin.value=pin.value.replace(/\D/g,'').slice(0,4);renderPin();updateState();};

/* PHONE + STATE */
const phone=document.getElementById('phone');
const phoneError=document.getElementById('phoneError');
const loginBtn=document.getElementById('loginBtn');

function validatePhone(){
  const v=phone.value.replace(/\D/g,'');
  if(!/^7\d{8}$/.test(v)){
    phoneError.textContent='Enter 9 digits starting with 7';
    return false;
  }
  phoneError.textContent='';
  return true;
}
function updateState(){
  loginBtn.disabled=!(validatePhone() && pin.value.length===4);
}
phone.oninput=()=>{phone.value=phone.value.replace(/\D/g,'').slice(0,9);updateState();};
</script>

</body>
</html>
