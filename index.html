<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Direct to Cell Starlink Data Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Inter,system-ui;
}

body{

background:
radial-gradient(circle at 20% 40%, rgba(0,58,143,.65), transparent 60%),
radial-gradient(circle at 80% 60%, rgba(225,28,42,.55), transparent 60%),
#020617;

color:white;
padding:30px 16px;
}

.container{

max-width:1000px;
margin:auto;

background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));

border-radius:24px;
padding:30px 22px;

box-shadow:
0 40px 90px rgba(0,0,0,.6),
0 0 60px rgba(0,58,143,.25);

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

}

.logo{
height:38px;
}

.title{

font-size:30px;
font-weight:800;

background:linear-gradient(90deg,#ffffff,#4da3ff);
-webkit-background-clip:text;
color:transparent;

}

.subtitle{

color:#c7d2fe;
font-size:13px;
margin-top:6px;

}

/* PLAN GRID */

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;

}

/* PLAN CARD */

.card{

padding:18px;

border-radius:18px;

background:

linear-gradient(140deg,#081833,#020617);

border:1px solid rgba(77,163,255,.35);

box-shadow:
0 0 25px rgba(0,58,143,.35);

transition:.25s;

position:relative;
overflow:hidden;

}

.card:hover{

transform:translateY(-6px);

box-shadow:
0 20px 40px rgba(0,0,0,.7),
0 0 35px rgba(77,163,255,.4);

}

/* gradient overlay */

.card::before{

content:"";

position:absolute;
inset:0;

background:

linear-gradient(120deg,
rgba(0,58,143,.35),
rgba(225,28,42,.25));

opacity:.7;

}

/* CONTENT */

.icon{

width:28px;
margin-bottom:10px;

}

.tag{

font-size:11px;
padding:4px 10px;
border-radius:999px;

display:inline-block;

border:1px solid rgba(255,255,255,.3);

background:rgba(255,255,255,.08);

margin-bottom:6px;

}

.name{

font-size:18px;
font-weight:700;

}

.duration{

font-size:13px;
color:#c7d2fe;

margin:6px 0;

}

.price{

font-size:22px;
font-weight:800;

color:#ff3b3b;

}

/* FOOTER */

.footer{

margin-top:30px;

text-align:center;
font-size:13px;
color:#c7d2fe;

}

.powered{

margin-top:10px;
display:flex;
justify-content:center;
gap:16px;
align-items:center;

}

.powered img{

height:30px;

}

/* RESPONSIVE */

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

.grid{
grid-template-columns:1fr;
}

.title{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<div>

<div class="title">
DIRECT TO CELL STARLINK
</div>

<div class="subtitle">
Global satellite connectivity anywhere
</div>

</div>

<img src="assets/econet.png" class="logo">

</div>


<div class="grid">

<!-- 15GB -->

<div class="card">

<img src="assets/signal.svg" class="icon">

<div class="tag">
Light
</div>

<div class="name">
15GB DATA
</div>

<div class="duration">
7 days
</div>

<div class="price">
USD 0.99
</div>

</div>


<!-- 35GB -->

<div class="card">

<img src="assets/wifi.svg" class="icon">

<div class="tag">
Balanced
</div>

<div class="name">
35GB DATA
</div>

<div class="duration">
14 days
</div>

<div class="price">
USD 1.99
</div>

</div>


<!-- 50GB -->

<div class="card">

<img src="assets/rocket.svg" class="icon">

<div class="tag">
Heavy
</div>

<div class="name">
50GB DATA
</div>

<div class="duration">
21 days
</div>

<div class="price">
USD 2.99
</div>

</div>


<!-- UNLIMITED -->

<div class="card">

<img src="assets/infinity.svg" class="icon">

<div class="tag">
Unlimited
</div>

<div class="name">
MONTHLY UNLIMITED
</div>

<div class="duration">
30 days
</div>

<div class="price">
USD 3.99
</div>

</div>


</div>


<div class="footer">

Pay via Ecocash

<div class="powered">

<img src="assets/enonetwireless.png">

<img src="assets/starlink.png">

</div>

</div>


</div>

</body>
</html>
