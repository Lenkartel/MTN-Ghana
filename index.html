<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Starlink to Cell — Data Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}

:root{
  --eco-blue:#003a8f;
  --eco-red:#e11c2a;
  --text-dark:#020617;
}

/* BODY – space / satellite feel */
body{
  font-family:Inter,system-ui,Arial;
  background:
    radial-gradient(900px 500px at 85% -10%, rgba(0,58,143,.14), transparent 45%),
    radial-gradient(700px 400px at -10% 30%, rgba(225,28,42,.12), transparent 45%),
    radial-gradient(2px 2px at 20% 30%, rgba(0,0,0,.15), transparent),
    radial-gradient(2px 2px at 60% 70%, rgba(0,0,0,.12), transparent),
    #ffffff;
  color:var(--text-dark);
}

/* PAGE */
.page{
  max-width:960px;
  margin:8px auto;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.94);
  box-shadow:0 14px 40px rgba(0,0,0,.16);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

h1{
  margin:0;
  font-size:26px;
  font-weight:700;
  line-height:1.15;
  letter-spacing:-.2px;
}

h1 span{color:var(--eco-blue)}

.subtitle{
  margin-top:4px;
  font-size:13px;
  color:#374151;
}

.powered{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
}

.powered img{height:32px}

/* PLANS WRAPPER */
.plans-wrapper{
  border-radius:22px;
  padding:16px;
  background:linear-gradient(180deg, rgba(0,58,143,.07), rgba(255,255,255,.75));
}

/* GRID */
.plans-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

/* PLAN CARD */
.plan-card{
  background:rgba(255,255,255,.9);
  border-radius:18px;
  padding:18px;
  border:2px solid var(--eco-blue);
  cursor:pointer;
  transition:.25s ease;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.plan-card:hover{
  transform:translateY(-4px);
  border-color:var(--eco-red);
  box-shadow:0 14px 32px rgba(0,0,0,.18);
}

/* CAPSULE TAG */
.plan-tag{
  display:inline-block;
  width:auto;
  align-self:flex-start;
  padding:5px 12px;
  border-radius:999px;
  border:1.5px solid var(--eco-red);
  background:linear-gradient(135deg, rgba(225,28,42,.18), rgba(0,58,143,.18));
  font-size:10.5px;
  margin-bottom:6px;
}

/* TEXT */
.plan-name{font-weight:600}
.plan-duration{font-size:12px;color:#374151;margin:4px 0}
.plan-price{font-size:18px;font-weight:700;color:var(--eco-blue)}

/* CTA CAPSULE */
.plan-cta{
  display:inline-block;
  width:auto;
  font-size:12px;
  font-weight:600;
  color:var(--eco-blue);
}

/* NOTE */
.note{
  margin-top:12px;
  font-size:11.5px;
  color:#374151;
  text-align:center;
}

/* FOOTER */
.footer{
  margin-top:12px;
  font-size:10.5px;
  text-align:center;
  color:#6b7280;
}

/* MODAL – GLASS */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.modal-box{
  background:rgba(255,255,255,.25);
  backdrop-filter:blur(16px);
  width:100%;
  max-width:420px;
  border-radius:18px;
  padding:18px;
  border:2px solid var(--eco-blue);
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-close{
  background:none;
  border:0;
  font-size:20px;
  cursor:pointer;
}

.modal-details{
  background:rgba(255,255,255,.35);
  border-radius:12px;
  padding:12px;
  margin:12px 0;
  font-size:13px;
}

.modal-footer{
  display:flex;
  justify-content:flex-end;
  gap:10px;
}

.btn{
  padding:10px 16px;
  border-radius:10px;
  border:0;
  font-weight:600;
  cursor:pointer;
}

.btn-ghost{background:#e5e7eb}

.btn-primary{
  background:linear-gradient(135deg, var(--eco-blue), var(--eco-red));
  color:#ffffff;
}

/* RESPONSIVE */
@media(max-width:900px){
  .plans-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){
  .plans-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="page">
  <header class="header">
    <div>
      <h1><span>Starlink</span> to Cell — Data Plans</h1>
      <div class="subtitle">Fast, reliable satellite data, paid instantly via Ecocash.</div>
    </div>
    <div class="powered">
      <span>Powered by</span>
      <img src="assets/EconetLogo.png" alt="Econet">
    </div>
  </header>

  <div class="plans-wrapper">
    <div class="plans-grid">

      <button class="plan-card" data-plan-id="15gb">
        <div>
          <div class="plan-tag">Best for light users</div>
          <div class="plan-name">15GB Data</div>
          <div class="plan-duration">7-Day Plan</div>
        </div>
        <div>
          <div class="plan-price">USD 0.99</div>
          <div class="plan-cta">View details & pay →</div>
        </div>
      </button>

      <button class="plan-card" data-plan-id="35gb">
        <div>
          <div class="plan-tag">Balanced</div>
          <div class="plan-name">35GB Data</div>
          <div class="plan-duration">14-Day Plan</div>
        </div>
        <div>
          <div class="plan-price">USD 1.99</div>
          <div class="plan-cta">View details & pay →</div>
        </div>
      </button>

      <button class="plan-card" data-plan-id="50gb">
        <div>
          <div class="plan-tag">Heavy use</div>
          <div class="plan-name">50GB Data</div>
          <div class="plan-duration">21-Day Plan</div>
        </div>
        <div>
          <div class="plan-price">USD 2.99</div>
          <div class="plan-cta">View details & pay →</div>
        </div>
      </button>

      <button class="plan-card" data-plan-id="unlimited">
        <div>
          <div class="plan-tag">Most popular</div>
          <div class="plan-name">Monthly Unlimited</div>
          <div class="plan-duration">30-Day Plan</div>
        </div>
        <div>
          <div class="plan-price">USD 3.99</div>
          <div class="plan-cta">View details & pay →</div>
        </div>
      </button>

    </div>
  </div>

  <div class="note">Selecting a plan will redirect you to a secure Ecocash payment page.</div>
  <div class="footer">
    Ecocash is a registered trademark of Econet Wireless. Transactions are subject to Econet terms and conditions.
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="planModal">
  <div class="modal-box">
    <div class="modal-header">
      <strong id="modalTitle"></strong>
      <button class="modal-close" id="closeModal">×</button>
    </div>
    <p id="modalSummary"></p>
    <div class="modal-details" id="modalSpecs"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="cancelPlan">Cancel</button>
      <button class="btn btn-primary" id="payButton">Pay with Ecocash</button>
    </div>
  </div>
</div>

<script>
const plans={
  "15gb":{name:"15GB Data — 7 Day Plan",price:"USD 0.99",duration:"7 days",summary:"Perfect for light browsing.",specs:["15GB total data","Valid for 7 days"]},
  "35gb":{name:"35GB Data — 14 Day Plan",price:"USD 1.99",duration:"14 days",summary:"Balanced usage.",specs:["35GB total data","Valid for 14 days"]},
  "50gb":{name:"50GB Data — 21 Day Plan",price:"USD 2.99",duration:"21 days",summary:"Heavy usage.",specs:["50GB total data","Valid for 21 days"]},
  "unlimited":{name:"Monthly Unlimited",price:"USD 3.99",duration:"30 days",summary:"Unlimited usage.",specs:["Unlimited data","Valid for 30 days"]}
};

let selectedPlan=null;
const modal=document.getElementById('planModal');

document.querySelectorAll('.plan-card').forEach(card=>{
  card.onclick=()=>{
    selectedPlan=plans[card.dataset.planId];
    modal.style.display='flex';
    modalTitle.textContent=selectedPlan.name;
    modalSummary.textContent=selectedPlan.summary;
    modalSpecs.innerHTML=
      `<strong>Price:</strong> ${selectedPlan.price}<br>
       <strong>Validity:</strong> ${selectedPlan.duration}
       <ul>${selectedPlan.specs.map(s=>`<li>${s}</li>`).join('')}</ul>`;
  };
});

payButton.onclick=()=>{
  sessionStorage.setItem('selectedPlan', JSON.stringify(selectedPlan));
  location.href='/login.html';
};

closeModal.onclick=
cancelPlan.onclick=
()=>modal.style.display='none';

modal.onclick=e=>{
  if(e.target===modal) modal.style.display='none';
};
</script>

</body>
</html>
