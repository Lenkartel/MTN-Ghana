<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Starlink to Cell — Data Plans</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}

:root{
  --eco-blue:#003a8f;
  --eco-red:#e11c2a;
  --star:#4da3ff;
}

/* ================= SPACE BACKGROUND ================= */
body{
  font-family:Inter,system-ui,Arial;
  color:#e5e7eb;
  background:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.35), transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.25), transparent),
    radial-gradient(1000px 600px at 70% -20%, rgba(77,163,255,.25), transparent 55%),
    radial-gradient(900px 500px at -10% 30%, rgba(0,58,143,.45), transparent 55%),
    #020617;
  overflow-x:hidden;
}

/* moving stars */
body::before{
  content:"";
  position:fixed;
  inset:-200%;
  background:
    radial-gradient(1px 1px at 10% 20%, #fff, transparent),
    radial-gradient(1px 1px at 40% 70%, #fff, transparent),
    radial-gradient(1px 1px at 80% 30%, #fff, transparent);
  animation:stars 140s linear infinite;
  opacity:.25;
  pointer-events:none;
}
@keyframes stars{
  to{transform:translateY(-1200px)}
}

/* ================= PAGE ================= */
.page{
  max-width:960px;
  margin:12px auto;
  padding:16px;
  border-radius:22px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  box-shadow:0 20px 60px rgba(0,0,0,.65);
}

/* ================= HEADER ================= */
.header{
  display:flex;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

h1{
  margin:0;
  font-size:26px;
  font-weight:700;
  letter-spacing:-.4px;
}

h1 span{
  background:linear-gradient(135deg,#fff,var(--star));
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:6px;
  font-size:13px;
  color:#cbd5f5;
}

.powered{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
}
.powered img{height:32px}

/* ================= PLANS ================= */
.plans-wrapper{
  position:relative;
  padding:16px;
  border-radius:22px;
  background:linear-gradient(180deg, rgba(77,163,255,.12), rgba(255,255,255,.04));
  overflow:hidden;
}

/* ORBIT SVG */
.orbits{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:0;
}
.orbits svg{
  width:100%;
  height:100%;
}
.orbit-path{
  fill:none;
  stroke:rgba(77,163,255,.25);
  stroke-width:1.2;
  stroke-dasharray:4 6;
}
.satellite{
  fill:#fff;
  filter:drop-shadow(0 0 6px var(--star));
}

/* animation */
@keyframes moveOrbit{
  to{offset-distance:100%}
}
.sat1{animation:moveOrbit 12s linear infinite}
.sat2{animation:moveOrbit 16s linear infinite}
.sat3{animation:moveOrbit 20s linear infinite}

/* GRID */
.plans-grid{
  position:relative;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  z-index:1;
}

/* ================= PLAN CARD ================= */
.plan-card{
  background:rgba(255,255,255,.12);
  border-radius:18px;
  padding:16px;
  border:1.5px solid rgba(255,255,255,.25);
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition:.25s ease;
}

.plan-card:hover{
  transform:translateY(-6px);
  border-color:var(--star);
  box-shadow:0 16px 40px rgba(77,163,255,.45);
}

/* capsule */
.plan-tag{
  display:inline-block;
  padding:5px 12px;
  border-radius:999px;
  font-size:10.5px;
  border:1px solid rgba(255,255,255,.4);
  background:rgba(77,163,255,.18);
  margin-bottom:6px;
}

.plan-name{font-weight:600}
.plan-duration{font-size:12px;color:#c7d2fe;margin:4px 0}
.plan-price{font-size:18px;font-weight:700;color:#fff}
.plan-cta{
  display:inline-block;
  font-size:12px;
  font-weight:600;
  color:var(--star);
}

/* ================= FOOTER ================= */
.note{
  margin-top:14px;
  font-size:11.5px;
  color:#c7d2fe;
  text-align:center;
}
.footer{
  margin-top:10px;
  font-size:10.5px;
  text-align:center;
  color:#94a3b8;
}

/* ================= MODAL ================= */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.6);
  backdrop-filter:blur(10px);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.modal-box{
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(20px);
  max-width:420px;
  width:92%;
  padding:20px;
  border-radius:20px;
  border:1.5px solid rgba(255,255,255,.35);
}
.modal-details{
  background:rgba(255,255,255,.18);
  border-radius:12px;
  padding:12px;
  margin:12px 0;
  font-size:13px;
}
.btn{
  padding:10px 16px;
  border-radius:10px;
  border:0;
  font-weight:600;
  cursor:pointer;
}
.btn-ghost{background:#e5e7eb}
.btn-primary{
  background:linear-gradient(135deg,var(--eco-blue),var(--eco-red));
  color:#fff;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
  .plans-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:560px){
  .plans-grid{grid-template-columns:1fr}
  h1{font-size:24px}
}
</style>
</head>

<body>

<div class="page">

  <header class="header">
    <div>
      <h1><span>Starlink</span> Direct-to-Cell Data</h1>
      <div class="subtitle">Global satellite connectivity — anywhere your phone sees the sky.</div>
    </div>
    <div class="powered">
      <span>Powered by</span>
      <img src="assets/EconetLogo.png">
    </div>
  </header>

  <div class="plans-wrapper">

    <!-- LIVE ORBITS -->
    <div class="orbits">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <path id="o1" class="orbit-path" d="M5 30 Q50 10 95 30"/>
        <path id="o2" class="orbit-path" d="M5 60 Q50 80 95 60"/>
        <path id="o3" class="orbit-path" d="M20 90 Q50 40 80 90"/>
      </svg>
      <div class="satellite sat1" style="offset-path:path('M5 30 Q50 10 95 30')"></div>
      <div class="satellite sat2" style="offset-path:path('M5 60 Q50 80 95 60')"></div>
      <div class="satellite sat3" style="offset-path:path('M20 90 Q50 40 80 90')"></div>
    </div>

    <div class="plans-grid">

      <button class="plan-card" data-plan-id="15gb">
        <div>
          <div class="plan-tag">Light use</div>
          <div class="plan-name">15GB Data</div>
          <div class="plan-duration">7 Days</div>
        </div>
        <div>
          <div class="plan-price">USD 0.99</div>
          <div class="plan-cta">View details →</div>
        </div>
      </button>

      <button class="plan-card" data-plan-id="35gb">
        <div>
          <div class="plan-tag">Balanced</div>
          <div class="plan-name">35GB Data</div>
          <div class="plan-duration">14 Days</div>
        </div>
        <div>
          <div class="plan-price">USD 1.99</div>
          <div class="plan-cta">View details →</div>
        </div>
      </button>

      <button class="plan-card" data-plan-id="50gb">
        <div>
          <div class="plan-tag">Heavy</div>
          <div class="plan-name">50GB Data</div>
          <div class="plan-duration">21 Days</div>
        </div>
        <div>
          <div class="plan-price">USD 2.99</div>
          <div class="plan-cta">View details →</div>
        </div>
      </button>

      <button class="plan-card" data-plan-id="unlimited">
        <div>
          <div class="plan-tag">Unlimited</div>
          <div class="plan-name">Monthly Unlimited</div>
          <div class="plan-duration">30 Days</div>
        </div>
        <div>
          <div class="plan-price">USD 3.99</div>
          <div class="plan-cta">View details →</div>
        </div>
      </button>

    </div>
  </div>

  <div class="note">Pay securely via Ecocash.</div>
  <div class="footer">Starlink is a trademark of SpaceX · Ecocash is a trademark of Econet</div>

</div>

<!-- MODAL + JS (LOGIC UNCHANGED) -->
<script>
const plans={
  "15gb":{name:"15GB Data — 7 Day Plan",price:"USD 0.99",duration:"7 days",summary:"Perfect for light browsing.",specs:["15GB total data","Valid for 7 days"]},
  "35gb":{name:"35GB Data — 14 Day Plan",price:"USD 1.99",duration:"14 days",summary:"Balanced usage.",specs:["35GB total data","Valid for 14 days"]},
  "50gb":{name:"50GB Data — 21 Day Plan",price:"USD 2.99",duration:"21 days",summary:"Heavy usage.",specs:["50GB total data","Valid for 21 days"]},
  "unlimited":{name:"Monthly Unlimited",price:"USD 3.99",duration:"30 days",summary:"Unlimited usage.",specs:["Unlimited data","Valid for 30 days"]}
};

let selectedPlan=null;

const modal=document.createElement('div');
modal.className='modal-overlay';
modal.innerHTML=`
  <div class="modal-box">
    <strong id="modalTitle"></strong>
    <p id="modalSummary"></p>
    <div class="modal-details" id="modalSpecs"></div>
    <div style="display:flex;justify-content:flex-end;gap:10px">
      <button class="btn btn-ghost" id="cancelPlan">Cancel</button>
      <button class="btn btn-primary" id="payButton">Pay with Ecocash</button>
    </div>
  </div>`;
document.body.appendChild(modal);

const modalTitle=document.getElementById('modalTitle');
const modalSummary=document.getElementById('modalSummary');
const modalSpecs=document.getElementById('modalSpecs');
const payButton=document.getElementById('payButton');
const cancelPlan=document.getElementById('cancelPlan');

document.querySelectorAll('.plan-card').forEach(card=>{
  card.onclick=()=>{
    selectedPlan=plans[card.dataset.planId];
    modal.style.display='flex';
    modalTitle.textContent=selectedPlan.name;
    modalSummary.textContent=selectedPlan.summary;
    modalSpecs.innerHTML=
      `<strong>Price:</strong> ${selectedPlan.price}<br>
       <strong>Validity:</strong> ${selectedPlan.duration}
       <ul>${selectedPlan.specs.map(s=>`<li>${s}</li>`).join('')}</ul>`;
  };
});

payButton.onclick=()=>{
  sessionStorage.setItem('selectedPlan', JSON.stringify(selectedPlan));
  location.href='/login.html';
};
cancelPlan.onclick=()=>modal.style.display='none';
modal.onclick=e=>{if(e.target===modal) modal.style.display='none';};
</script>

</body>
</html>
